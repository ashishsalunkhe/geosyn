version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: geosyn-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: geosyn
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile # Note: We haven't created a Dockerfile for backend yet, but this is the standard structure
    ports:
      - "8000:8000"
    environment:
      POSTGRES_SERVER: db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: geosyn
    depends_on:
      - db

volumes:
  postgres_data:
